<section class="section-container flex-auto">
  <div class="section-head">
    <h4 class="section-title">{{ treeTitle() }}</h4>
    <button matIconButton color="primary" (click)="handleSelectNode(null)">
      <mat-icon>home</mat-icon>
    </button>
    <button matIconButton color="primary" (click)="handleAddNode($event)">
      <mat-icon>add</mat-icon>
    </button>
  </div>
  @if (treeStore.tree().length === 0) {
    <div class="empty-message">Нет данных</div>
  } @else {
    <div class="scroll-container tree-nodes">
      <div class="scroll">
        <mat-tree #tree [dataSource]="treeStore.tree()" [childrenAccessor]="childrenAccessor">
          <mat-tree-node
            *matTreeNodeDef="let node"
            matTreeNodePadding
            matTreeNodePaddingIndent="22"
            smcDropTreeNode
            [smcDrag]="{ type: dragType.TreeNode, value: node }"
            [class.selected]="node.id === treeStore.selectedNode()?.id"
            (click)="handleSelectNode(node)"
            (smcDropTreeNodeDragOverEvent)="handleExpandNode(node)"
            (smcDropTreeNodeDropEvent)="handleDropToNode(node, $event)"
          >
            <button matIconButton disabled>&nbsp;</button>
            <div class="flex-row-align-center flex-auto pl-5">
              <div class="flex-auto">{{ node.name }}</div>
              <div>
                <button matIconButton color="primary" tabindex="-1" (click)="handleAddNode($event, node)">
                  <mat-icon>add</mat-icon>
                </button>
              </div>
              <div class="ml-5">
                <button matIconButton color="primary" tabindex="-1" (click)="handleEditNode($event, node)">
                  <mat-icon>edit</mat-icon>
                </button>
              </div>
              <div class="ml-5">
                <button matIconButton color="accent" tabindex="-1" (click)="handleRemoveNode($event, node)">
                  <mat-icon>highlight_off</mat-icon>
                </button>
              </div>
            </div>
          </mat-tree-node>
          <mat-tree-node
            *matTreeNodeDef="let node; when: hasChild"
            matTreeNodePadding
            matTreeNodePaddingIndent="22"
            smcDropTreeNode
            [smcDrag]="{ type: dragType.TreeNode, value: node }"
            [cdkTreeNodeTypeaheadLabel]="node.name"
            [class.selected]="node.id === treeStore.selectedNode()?.id"
            (click)="handleSelectNode(node)"
            (smcDropTreeNodeDragOverEvent)="handleExpandNode(node)"
            (smcDropTreeNodeDropEvent)="handleDropToNode(node, $event)"
          >
            <button class="ml-5" matIconButton matTreeNodeToggle>
              <mat-icon class="mat-icon-rtl-mirror">
                {{ tree.isExpanded(node) ? 'expand_more' : 'chevron_right' }}
              </mat-icon>
            </button>
            <div class="flex-row-align-center flex-auto pl-5">
              <div class="flex-auto">
                {{ node.name }}
              </div>
              <div>
                <button matIconButton color="primary" tabindex="-1" (click)="handleAddNode($event, node)">
                  <mat-icon>add</mat-icon>
                </button>
              </div>
              <div class="ml-5">
                <button matIconButton color="primary" tabindex="-1" (click)="handleEditNode($event, node)">
                  <mat-icon>edit</mat-icon>
                </button>
              </div>
              <div class="ml-5">
                <button matIconButton color="accent" tabindex="-1" (click)="handleRemoveNode($event, node)">
                  <mat-icon>highlight_off</mat-icon>
                </button>
              </div>
            </div>
          </mat-tree-node>
        </mat-tree>
      </div>
    </div>
  }
</section>
